<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이력서</title>
  <style>
    /* ════════════════════════════════
       CSS 변수 + 기본 크기
       기준: 1.6rem = 16px (html default) 기준이면 25.6px
       → html font-size를 10px로 잡고 1rem=10px로 쓰는 방식 대신
         body font-size를 16px로 두고 rem 단위 그대로 사용
    ════════════════════════════════ */
    :root {
      --blue:    #3757c8;
      --blue-dk: #2a429e;
      --text:    #1a1a1a;
      --muted:   #4a4a4a;
      --light:   #737373;
      --faint:   #aaaaaa;
      --border:  #e0e0e0;
      --sub-bd:  #efefef;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 10px; } /* 1rem = 10px → 1.6rem = 16px */

    body {
      background: #fff;
      color: var(--text);
      font-family: 'Malgun Gothic', '맑은 고딕', -apple-system, BlinkMacSystemFont,
                   'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      font-size: 1.6rem;        /* 기본 본문 = 16px */
      line-height: 1.85;
      -webkit-font-smoothing: antialiased;
      word-break: keep-all;
    }

    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── PDF 버튼 ── */
    #pdf-btn {
      position: fixed; top: 18px; right: 24px; z-index: 999;
      display: flex; align-items: center; gap: 6px;
      padding: 0.8rem 1.8rem; background: var(--blue); color: #fff;
      font-family: inherit; font-size: 1.6rem; font-weight: 700;
      border: none; border-radius: 4px; cursor: pointer;
      box-shadow: 0 2px 10px rgba(55,87,200,.3);
      transition: background .15s;
    }
    #pdf-btn:hover { background: var(--blue-dk); }

    /* ── 레이아웃 ── */
    .wrap { max-width: 860px; margin: 0 auto; padding: 6.4rem 4rem 11rem; }
    #loading { text-align: center; padding: 8rem 0; color: var(--faint); font-size: 1.6rem; }

    hr    { border: none; border-top: 1px solid var(--border); margin: 5.2rem 0; }
    hr.sm { border: none; border-top: 1px solid var(--sub-bd); margin: 2.4rem 0; }

    /* ════════════ 타이포 스케일 (1rem = 10px) ════════════
       이름          3.2rem = 32px
       섹션 제목     2.6rem = 26px
       회사명        2.4rem = 24px
       소제목(배경.) 2.0rem = 20px
       기준 본문     1.6rem = 16px  ← 모든 본문/메타/리스트 통일
    ════════════════════════════════════════════════════ */

    /* 헤더 */
    .hd-name { font-size: 3.2rem; font-weight: 700; line-height: 1.2; margin-bottom: 0.4rem; }
    .hd-sub  { font-size: 1.6rem; color: var(--light); margin-bottom: 2rem; }

    /* 섹션 제목 */
    .sec-title {
      font-size: 2.6rem; font-weight: 700;
      color: var(--blue); margin-bottom: 3.2rem;
      letter-spacing: -.3px;
    }

    /* Introduce 본문 */
    .intro-body { font-size: 1.6rem; color: var(--muted); line-height: 1.95; margin-bottom: 2rem; }

    /* ════════════ Experiences 2컬럼 ════════════ */
    .exp-row {
      display: grid;
      grid-template-columns: 21rem 1fr;
      gap: 0 5.2rem;
      margin-bottom: 4rem;
    }
    .exp-row:last-child { margin-bottom: 0; }

    .exp-left { padding-top: 2px; }
    .co-name  { font-size: 2.4rem; font-weight: 700; line-height: 1.25; margin-bottom: 0.6rem; }
    .co-name .dot { color: var(--blue); }
    .exp-role-line { font-size: 1.6rem; color: var(--muted); margin-bottom: 2px; }
    .exp-period    { font-size: 1.6rem; color: var(--light); margin-bottom: 0.5rem; }
    .exp-note      { font-size: 1.6rem; color: var(--faint); font-style: italic; line-height: 1.7; }
    .exp-co-desc   { font-size: 1.6rem; color: var(--light); margin-bottom: 1.2rem; }

    /* ════════════ Main Projects 1컬럼 ════════════ */
    .proj-block { margin-bottom: 4rem; }
    .proj-block:last-child { margin-bottom: 0; }

    .pj-name { font-size: 2.0rem; font-weight: 700; line-height: 1.3; margin-bottom: 0.4rem; }
    .pj-name .dot { color: var(--blue); }
    .pj-period { font-size: 1.6rem; color: var(--light); margin-bottom: 1.4rem; }

    /* 배경 / 해결 / 결과 소제목 */
    .proj-lbl {
      font-size: 2.0rem; font-weight: 700;
      color: var(--text); margin: 1.8rem 0 0.8rem;
    }
    .proj-lbl .dot { color: var(--blue); }
    .proj-desc { font-size: 1.6rem; color: var(--muted); line-height: 1.9; }

    /* ════════════ 불릿 리스트 ════════════ */
    ul.bul { list-style: none; padding: 0; margin: 0; }
    ul.bul li {
      font-size: 1.6rem; color: var(--muted);
      padding-left: 1.4rem; position: relative;
      margin-bottom: 0.4rem; line-height: 1.8;
    }
    ul.bul li::before {
      content: ''; position: absolute; left: 1px; top: 10px;
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--blue);
    }

    /* Tech Stack 태그 */
    .tech-wrap { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 1.2rem; }
    .tech-tag {
      font-size: 1.6rem; padding: 2px 9px;
      background: #eef1fb; color: var(--blue);
      border-radius: 3px; font-weight: 500;
    }

    /* ════════════ Other Projects ════════════ */
    .other-grp-title { font-size: 1.8rem; font-weight: 700; color: var(--text); margin-bottom: 1.6rem; }
    .other-grp-title .dot { color: var(--blue); }
    .other-item { margin-bottom: 1.6rem; }
    .other-item:last-child { margin-bottom: 0; }
    .other-name { font-size: 1.6rem; font-weight: 700; color: var(--text); }
    .other-meta { font-size: 1.6rem; color: var(--faint); margin-bottom: 3px; }
    .other-desc { font-size: 1.6rem; color: var(--muted); line-height: 1.8; }

    /* ════════════ Skills ════════════ */
    .skill-row {
      display: grid; grid-template-columns: 17.5rem 1fr;
      gap: 0 3.2rem; margin-bottom: 0.9rem;
    }
    .skill-cat { font-size: 1.6rem; font-weight: 700; color: var(--text); }
    .skill-val { font-size: 1.6rem; color: var(--muted); }

    /* ════════════ Education ════════════ */
    .edu-sub-h { font-size: 1.8rem; font-weight: 700; color: var(--blue); margin-bottom: 1rem; }
    .edu-school { font-size: 1.6rem; font-weight: 700; color: var(--text); }
    .edu-sub    { font-size: 1.6rem; color: var(--muted); margin-bottom: 1.6rem; }

    /* ════════════ How I Work ════════════ */
    ul.plain { list-style: none; padding: 0; }
    ul.plain li {
      font-size: 1.6rem; color: var(--muted);
      padding-left: 1.4rem; position: relative;
      margin-bottom: 0.4rem; line-height: 1.8;
    }
    ul.plain li::before {
      content: ''; position: absolute; left: 1px; top: 10px;
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--blue);
    }

    /* ════════════ Contact ════════════ */
    .contact-list { list-style: none; padding: 0; }
    .contact-list li {
      display: flex; align-items: center; gap: 1.2rem;
      font-size: 1.6rem; margin-bottom: 1rem;
    }
    .c-badge {
      font-size: 1.6rem; font-weight: 700; color: #fff;
      background: var(--blue); border-radius: 3px;
      padding: 2px 9px; min-width: 5rem; text-align: center; flex-shrink: 0;
    }
    .c-val { color: var(--muted); }
    .c-val a { color: var(--blue); }

    /* ════════════ 하이라이트 ==텍스트== ════════════ */
    mark {
      background: none;
      color: var(--blue);
      font-weight: 700;
      padding: 0;
    }
    footer {
      margin-top: 6rem; padding-top: 1.8rem;
      border-top: 1px solid var(--border);
      font-size: 1.6rem; color: var(--faint);
    }

    /* ════════════ 반응형 ════════════ */
    @media (max-width: 680px) {
      .exp-row { grid-template-columns: 1fr; gap: 8px 0; }
      .exp-left {
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--sub-bd);
        margin-bottom: 1.4rem;
      }
      .skill-row { grid-template-columns: 1fr; }
      .wrap { padding: 4rem 1.8rem 8rem; }
      #pdf-btn { top: 12px; right: 12px; }
    }

    @media print {
      #pdf-btn { display: none !important; }
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .wrap { max-width: 100%; padding: 0; margin: 0; }
      hr { margin: 2.4rem 0; }
      /* 브라우저 기본 머리글/바닥글 숨기기 */
      @page {
        margin: 15mm 18mm;
        size: A4;
      }
    }
  </style>
</head>
<body>

<button id="pdf-btn" onclick="printPDF()">
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
       stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
       style="margin-right:3px">
    <path d="M12 16V4M6 10l6 6 6-6"/>
    <rect x="3" y="19" width="18" height="2" rx="1" fill="currentColor" stroke="none"/>
  </svg>
  PDF 저장
</button>

<div class="wrap">
  <div id="loading">이력서를 불러오는 중입니다...</div>
  <div id="resume" style="display:none;"></div>
</div>

<script>
/* ── PDF 저장 ── */
function printPDF(){
  window.print();
}

/* ════════════════════════════════════════════
   마크다운 파서 + 렌더러
   resume.md 구조:
     # 이름          → 헤더
     ## 섹션명.      → 섹션 분기
     ### 소제목      → 섹션 내 그룹
     - 항목          → 불릿
     `태그`          → tech tag
     **굵게**        → bold
     *이탤릭*        → italic
     [텍스트](url)   → 링크
     ---             → <hr>
════════════════════════════════════════════ */

/* ── 인라인 마크다운 ── */
function inline(s){
  return s
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
    .replace(/==([^=]+)==/g,             '<mark>$1</mark>')
    .replace(/\*\*([^*]+)\*\*/g,         '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g,             '<em>$1</em>')
    .replace(/`([^`]+)`/g,               '<code style="font-family:inherit;background:#eef1fb;color:var(--blue);padding:1px 6px;border-radius:3px;font-size:0.92em;">$1</code>');
}

/* ── 파란 마침표 ── */
function dot(t){ return `${t}<span class="dot">.</span>`; }

/* ── 불릿 파싱 ── */
function parseBullets(lines){
  const items = lines.filter(l=>l.match(/^[-*]\s/)).map(l=>inline(l.replace(/^[-*]\s+/,'')));
  if(!items.length) return '';
  return '<ul class="bul">'+items.map(i=>`<li>${i}</li>`).join('')+'</ul>';
}

/* ── 일반 목록 파싱 ── */
function parsePlain(lines){
  const items = lines.filter(l=>l.match(/^[-*]\s/)).map(l=>inline(l.replace(/^[-*]\s+/,'')));
  if(!items.length) return '';
  return '<ul class="plain">'+items.map(i=>`<li>${i}</li>`).join('')+'</ul>';
}

/* ── 기술 태그 줄 파싱 ── */
function parseTechLine(line){
  const tags = [...line.matchAll(/`([^`]+)`/g)].map(m=>m[1]);
  if(!tags.length) return '';
  return '<div class="tech-wrap">'+tags.map(t=>`<span class="tech-tag">${t}</span>`).join('')+'</div>';
}

/* ── 연락처 줄 파싱  "레이블: 텍스트 | url" ── */
function parseContactLine(line){
  const m = line.match(/^[-*]\s+([^:]+):\s+([^|]+)\|\s*(.+)$/);
  if(!m) return null;
  return { label: m[1].trim(), text: m[2].trim(), url: m[3].trim() };
}

/* ════════════════════════════════════════════
   섹션별 렌더러
════════════════════════════════════════════ */

/* 헤더 */
function renderHeader(lines){
  const name     = lines.find(l=>l.startsWith('# '))?.replace(/^# /,'') || '';
  const subtitle = lines.find(l=>!l.startsWith('#') && l.trim() && !l.startsWith('-'))?.trim() || '';

  return `
    <p class="hd-name">${name}</p>
    <p class="hd-sub">${subtitle}</p>`;
}

/* Introduce */
function renderIntroduce(lines){
  let html = `<section>`;
  let mode = 'body';
  let bodyLines = [], curH3 = '', listLines = [];

  function flush(){
    if(curH3){
      html += `<p class="sub-title">${dot(curH3)}</p>`;
      html += parseBullets(listLines);
      curH3 = ''; listLines = [];
    }
  }

  for(const line of lines){
    if(line.startsWith('### ')){
      flush();
      if(mode === 'body' && bodyLines.length){
        html += `<p class="intro-body">${bodyLines.join('<br>')}</p>`;
        bodyLines = [];
      }
      mode = 'list';
      curH3 = line.replace(/^### /,'').replace(/\.$/, '');
    } else if(mode === 'body' && line.trim()){
      bodyLines.push(inline(line));
    } else if(mode === 'list'){
      listLines.push(line);
    }
  }
  if(mode === 'body' && bodyLines.length)
    html += `<p class="intro-body">${bodyLines.join(' ')}</p>`;
  flush();
  return html + '</section>';
}

/* Experiences */
function renderExperiences(lines){
  let html = `<section><p class="sec-title">${dot('Experiences')}</p>`;
  const blocks = splitByH3(lines);

  blocks.forEach((b, bi)=>{
    // 첫 줄: "역할 | 기간"
    const meta    = b.lines.find(l=>l.includes('|') && !l.startsWith('`'));
    const [role, period] = meta ? meta.split('|').map(s=>s.trim()) : ['',''];
    // 회사 설명 (이탤릭 *...*) + 겸직 메모
    const descLine = b.lines.find(l=>l.match(/^\*/));
    const noteMatch = descLine?.match(/\*([^*]+)\*/);
    const compDesc = b.lines.find(l=>!l.startsWith('#') && !l.includes('|') && !l.startsWith('-') && !l.startsWith('`') && !l.startsWith('*') && l.trim());
    const bullets  = parseBullets(b.lines);
    const techLine = b.lines.find(l=>l.startsWith('`'));
    const techHtml = techLine ? parseTechLine(techLine) : '';

    html += `
    <div class="exp-row">
      <div class="exp-left">
        <p class="co-name">${b.title}<span class="dot">.</span></p>
        ${role   ? `<p class="exp-role-line">${role}</p>` : ''}
        ${period ? `<p class="exp-period">${period}</p>` : ''}
        ${noteMatch ? `<p class="exp-note">${noteMatch[1]}</p>` : ''}
      </div>
      <div class="exp-right">
        ${compDesc ? `<p class="exp-co-desc">${inline(compDesc)}</p>` : ''}
        ${bullets}
        ${techHtml}
      </div>
    </div>`;
    if(bi < blocks.length-1) html += '<hr class="sm">';
  });

  return html + '</section>';
}

/* Main Projects — 1컬럼 */
function renderMainProjects(lines){
  let html = `<section><p class="sec-title">${dot('Main Projects')}</p>`;
  const blocks = splitByH3(lines);

  blocks.forEach((b, bi)=>{
    const metaLine = b.lines.find(l=>l.includes('|') && !l.startsWith('`'));
    const [period, team] = metaLine ? metaLine.split('|').map(s=>s.trim()) : ['',''];

    let bodyHtml = '';
    let curLabel = '', accLines = [];

    function flushBlock(){
      if(!curLabel) return;
      const isBullet = accLines.some(l=>l.match(/^[-*]\s/));
      bodyHtml += `<p class="proj-lbl">${curLabel}<span class="dot">.</span></p>`;
      if(isBullet) bodyHtml += parseBullets(accLines);
      else bodyHtml += `<p class="proj-desc">${accLines.filter(l=>!l.match(/^`/)).map(inline).join(' ')}</p>`;
      curLabel = ''; accLines = [];
    }

    for(const line of b.lines){
      if(line.startsWith('**배경**')){ flushBlock(); curLabel='배경'; }
      else if(line.startsWith('**역할 및 기여**')){ flushBlock(); curLabel='역할 및 기여'; }
      else if(line.startsWith('**결과**')){ flushBlock(); curLabel='결과'; }
      else if(curLabel) accLines.push(line);
    }
    flushBlock();

    const techLine = b.lines.find(l=>l.match(/^`[^`]+`(\s*`[^`]+`)*\s*$/));
    const techHtml = techLine ? parseTechLine(techLine) : '';

    html += `<div class="proj-block">
      <p class="pj-name">${b.title}<span class="dot">.</span></p>
      ${period ? `<p class="pj-period">${period}${team ? ' &nbsp;|&nbsp; '+team : ''}</p>` : ''}
      ${bodyHtml}
      ${techHtml}
    </div>`;
    if(bi < blocks.length-1) html += '<hr class="sm">';
  });

  return html + '</section>';
}

/* Other Projects — 1컬럼 */
function renderOtherProjects(lines){
  let html = `<section><p class="sec-title">${dot('Other Projects')}</p>`;
  const groups = splitByH3(lines);

  groups.forEach((g, gi)=>{
    html += `<p class="other-grp-title">${g.title}<span class="dot">.</span></p>`;
    let i = 0;
    while(i < g.lines.length){
      const line = g.lines[i];
      const nameMatch = line.match(/^\*\*(.+?)\*\*\s*(.*)/);
      if(nameMatch){
        const desc = g.lines[i+1] && !g.lines[i+1].startsWith('**') && g.lines[i+1].trim() ? g.lines[i+1] : '';

        html += `<div class="other-item">
          <p class="other-name">${nameMatch[1]}</p>
          <p class="other-meta">${nameMatch[2]}</p>
          ${desc ? `<p class="other-desc">${inline(desc)}</p>` : ''}
        </div>`;
        i += desc ? 2 : 1;
      } else { i++; }
    }

    if(gi < groups.length-1) html += '<hr class="sm">';
  });

  return html + '</section>';
}

/* Skills */
function renderSkills(lines){
  let html = `<section><p class="sec-title">${dot('Skills')}</p>`;
  lines.filter(l=>l.startsWith('- ')).forEach(l=>{
    const m = l.match(/^-\s+\*\*(.+?)\*\*:\s+(.+)/);
    if(m) html += `<div class="skill-row"><div class="skill-cat">${m[1]}</div><div class="skill-val">${m[2]}</div></div>`;
  });
  return html + '</section>';
}

/* Education */
function renderEducation(lines){
  let html = `<section><p class="sec-title">${dot('Education')}</p>`;

  // 학력 (** 으로 시작하는 굵은 줄)
  const degLine = lines.find(l=>l.match(/^\*\*/));
  if(degLine){
    const m = degLine.match(/^\*\*([^*]+)\*\*\s*(.*)/);
    html += `<p class="edu-school">${m[1]}</p><p class="edu-sub">${m[2]}</p>`;
  }

  // ### 그룹 (자격/수상, 기타활동)
  splitByH3(lines).forEach(g=>{
    html += `<hr class="sm"><p class="edu-sub-h">${g.title}</p>`;
    g.lines.filter(l=>l.startsWith('- ')).forEach(l=>{
      // "**이름** · 기관 · 날짜" 형태
      const raw = l.replace(/^-\s+/,'');
      const m   = raw.match(/^\*\*([^*]+)\*\*\s*(.*)/);
      if(m){
        const rest = inline(m[2]);
        // 그 다음 줄이 → 로 시작하면 note
        const idx = g.lines.indexOf(l);
        const note = g.lines[idx+1]?.startsWith('  →') ? g.lines[idx+1].replace(/^\s+→\s*/,'') : '';
        html += `<div style="display:grid;grid-template-columns:1fr auto;gap:0 12px;margin-bottom:8px;align-items:baseline;">
          <div style="font-size:1.6rem;color:var(--text);font-weight:500;">${m[1]}</div>
          <div style="font-size:1.6rem;color:var(--faint);text-align:right;white-space:nowrap;">${rest.replace(/^·\s*/,'')}</div>
        </div>`;
        if(note) html += `<p style="font-size:1.6rem;color:var(--light);padding-left:.8em;margin-bottom:6px;">→ ${inline(note)}</p>`;
      } else {
        html += `<p style="font-size:1.6rem;color:var(--muted);margin-bottom:6px;">${inline(raw)}</p>`;
      }
    });
  });

  return html + '</section>';
}

/* How I Work */
function renderHowIWork(lines){
  return `<section><p class="sec-title">${dot('How i work?').replace('?.','?')}</p>${parsePlain(lines)}</section>`;
}

/* Contact */
function renderContact(lines){
  const contacts = lines.filter(l=>l.startsWith('- ')).map(parseContactLine).filter(Boolean);
  const items = contacts.map(c=>{
    const target = c.url.startsWith('mailto:') ? '' : ' target="_blank"';
    return `<li>
      <span class="c-badge">${c.label}</span>
      <span class="c-val"><a href="${c.url}"${target}>${c.text}</a></span>
    </li>`;
  }).join('');
  return `<section><p class="sec-title">${dot('Contact')}</p><ul class="contact-list">${items}</ul></section>`;
}

/* Footer */
function renderFooter(name, contacts){
  const em = contacts.find(c=>c.label==='이메일');
  return `<footer>${name} · ${em ? `<a href="${em.url}">${em.text}</a>` : ''}</footer>`;
}

/* ════════════════════════════════════════════
   유틸: h3 기준으로 블록 분리
════════════════════════════════════════════ */
function splitByH3(lines){
  const blocks = [];
  let cur = null;
  for(const line of lines){
    if(line.startsWith('### ')){
      if(cur) blocks.push(cur);
      cur = { title: line.replace(/^### /,'').replace(/\.$/, '').trim(), lines: [] };
    } else if(cur){
      cur.lines.push(line);
    }
  }
  if(cur) blocks.push(cur);
  return blocks;
}

/* ════════════════════════════════════════════
   메인: md 파일 로드 → 섹션 분리 → 렌더링
════════════════════════════════════════════ */
async function load(){
  try {
    const res = await fetch('./resume.md');
    const raw = await res.text();
    const allLines = raw.split('\n').map(l=>l.trimEnd());

    // --- 로 섹션 분리
    const sections = [];
    let cur = [];
    for(const line of allLines){
      if(line.startsWith('---')){ sections.push(cur); cur = []; }
      else cur.push(line);
    }
    sections.push(cur);

    // 섹션 헤더 감지
    function secTitle(s){ return s.find(l=>l.startsWith('## '))?.replace(/^## /,'').replace(/\.$/, '').trim() || ''; }
    function secLines(s){ return s.filter(l=>!l.startsWith('## ')); }

    let html = '';
    let contactData = [];
    let nameStr = '';

    sections.forEach((sec, idx)=>{
      const t = secTitle(sec);
      const ls = secLines(sec);

      if(idx === 0){
        nameStr = sec.find(l=>l.startsWith('# '))?.replace(/^# /,'') || '';
        contactData = sec.filter(l=>l.startsWith('- ')).map(parseContactLine).filter(Boolean);
        html += renderHeader(sec);
        // HR 없이 Introduce로 바로 이어짐
      } else if(t === 'Introduce')      { html += renderIntroduce(ls)     + '<hr>'; }
      else if(t === 'Experiences')      { html += renderExperiences(ls)   + '<hr>'; }
      else if(t === 'Main Projects')    { html += renderMainProjects(ls)  + '<hr>'; }
      else if(t === 'Other Projects')   { html += renderOtherProjects(ls) + '<hr>'; }
      else if(t === 'Skills')           { html += renderSkills(ls)        + '<hr>'; }
      else if(t === 'Education')        { html += renderEducation(ls)     + '<hr>'; }
      else if(t === 'How i work?')      { html += renderHowIWork(ls)      + '<hr>'; }
      else if(t === 'Contact')          { html += renderContact(ls); }
    });

    html += renderFooter(nameStr, contactData);

    document.getElementById('loading').style.display = 'none';
    const root = document.getElementById('resume');
    root.innerHTML = html;
    root.style.display = 'block';

    // 페이지 타이틀
    if(nameStr) document.title = `이력서 - ${nameStr}`;

  } catch(err){
    document.getElementById('loading').textContent =
      '⚠️ resume.md를 불러오지 못했습니다. Live Server 또는 로컬 서버로 실행해주세요.';
    console.error(err);
  }
}

load();
</script>
