<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이력서 - 권규희</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    /* ── RESET & BASE ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: #fff;
      color: #333;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 400;
      font-size: 16px;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
      word-break: keep-all;
    }

    a { color: #4078c0; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── LAYOUT ── */
    .wrap {
      max-width: 780px;
      margin: 0 auto;
      padding: 60px 24px 120px;
    }

    /* ── LOADING ── */
    #loading {
      text-align: center;
      padding: 80px 0;
      color: #999;
      font-size: 14px;
    }

    /* ── H1 ── */
    h1 {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 12px;
      color: #111;
    }

    /* ── INTRO ── */
    .intro {
      font-size: 15px;
      line-height: 1.9;
      color: #444;
      margin-bottom: 8px;
      white-space: pre-line;
    }

    /* ── CONTACT LINKS ── */
    .contact-links {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px 0;
      list-style: none;
    }
    .contact-links li { font-size: 14px; }
    .contact-links li:not(:last-child)::after {
      content: ' · ';
      color: #bbb;
      margin: 0 4px;
    }

    /* ── HR ── */
    hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 48px 0;
    }

    hr.thin {
      margin: 28px 0;
      border-top-color: #eee;
    }

    /* ── SECTION TITLE (h2) ── */
    h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 32px;
    }

    /* ── COMPANY BLOCK ── */
    .company-block { margin-bottom: 52px; }
    .company-block:last-child { margin-bottom: 0; }

    /* h3 = company name */
    h3 {
      font-size: 1.15rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 2px;
    }

    .company-meta {
      font-size: 13px;
      color: #888;
      margin-bottom: 4px;
    }

    .company-desc {
      font-size: 14px;
      color: #666;
      margin-bottom: 4px;
    }

    .company-note {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 20px;
      font-style: italic;
    }

    /* ── PROJECT BLOCK ── */
    .project-block {
      margin-bottom: 36px;
      padding-left: 16px;
      border-left: 3px solid #e6eaf0;
    }
    .project-block:last-child { margin-bottom: 0; }

    /* h4 = project name */
    h4 {
      font-size: 1rem;
      font-weight: 700;
      color: #222;
      margin-bottom: 2px;
    }

    .project-meta {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 12px;
    }

    /* ── LABELS ── */
    .label {
      font-size: 13px;
      font-weight: 700;
      color: #555;
      margin: 14px 0 6px;
    }

    /* ── DESCRIPTION ── */
    .desc {
      font-size: 14px;
      color: #555;
      line-height: 1.85;
      margin-bottom: 4px;
    }

    /* ── BULLET LIST ── */
    ul.bullet {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    ul.bullet li {
      font-size: 14px;
      color: #444;
      padding-left: 16px;
      position: relative;
      margin-bottom: 4px;
      line-height: 1.75;
    }
    ul.bullet li::before {
      content: '*';
      position: absolute;
      left: 0;
      color: #bbb;
      font-size: 13px;
      top: 1px;
    }

    /* ── RESULT ── */
    .result-line {
      font-size: 13px;
      color: #4078c0;
      margin-top: 10px;
      padding: 5px 10px;
      border-left: 2px solid #4078c0;
      background: #f5f8ff;
    }

    /* ── TECH STACK ── */
    .tech-stack {
      margin-top: 10px;
      font-size: 13px;
      color: #777;
    }
    .tech-stack span { font-weight: 500; color: #555; }

    /* ── SKILLS ── */
    .skill-row {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 0 16px;
      margin-bottom: 12px;
      font-size: 14px;
      align-items: start;
    }
    .skill-cat {
      font-weight: 700;
      color: #333;
      padding-top: 1px;
    }
    .skill-items { color: #555; }

    /* ── ABOUT ME ── */
    .about-block { margin-bottom: 24px; }
    .about-block:last-child { margin-bottom: 0; }

    /* h5 = sub category */
    h5 {
      font-size: 14px;
      font-weight: 700;
      color: #333;
      margin-bottom: 8px;
    }

    /* ── OTHER EXP ── */
    .other-block { margin-bottom: 28px; }
    .other-block:last-child { margin-bottom: 0; }
    .other-name {
      font-size: 1rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 2px;
    }
    .other-meta { font-size: 13px; color: #aaa; margin-bottom: 6px; }
    .other-desc { font-size: 14px; color: #555; }

    /* ── CERTS ── */
    .cert-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0 16px;
      font-size: 14px;
      margin-bottom: 8px;
      align-items: baseline;
    }
    .cert-name { color: #333; font-weight: 500; }
    .cert-sub { color: #aaa; font-size: 13px; text-align: right; }

    /* ── CONTACT SECTION ── */
    .contact-section ul {
      list-style: none;
      padding: 0;
    }
    .contact-section ul li {
      font-size: 14px;
      margin-bottom: 6px;
    }
    .contact-section ul li::before {
      content: '* ';
      color: #bbb;
    }

    /* ── FOOTER ── */
    footer {
      margin-top: 60px;
      padding-top: 24px;
      border-top: 1px solid #ddd;
      font-size: 12px;
      color: #bbb;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .wrap { padding: 40px 16px 80px; }
      h1 { font-size: 1.6rem; }
      .skill-row { grid-template-columns: 1fr; }
      .skill-cat { margin-bottom: 2px; }
      .cert-row { grid-template-columns: 1fr; }
      .cert-sub { text-align: left; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div id="loading">데이터를 불러오는 중입니다...</div>
  <div id="resume" style="display:none;"></div>
</div>

<script>
  // ── HELPERS ──
  function esc(str) {
    if (!str) return '';
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function tag(tagName, content, cls) {
    const c = cls ? ` class="${cls}"` : '';
    return `<${tagName}${c}>${content}</${tagName}>`;
  }

  function ul(items) {
    if (!items || items.length === 0) return '';
    return '<ul class="bullet">' + items.map(i => `<li>${esc(i)}</li>`).join('') + '</ul>';
  }

  // ── RENDERERS ──

  function renderHeader(data) {
    const contactLinks = data.contact.map(c =>
      `<li><a href="${esc(c.url)}">${esc(c.label)}</a></li>`
    ).join('');

    return `
      <h1>${esc(data.greeting)}</h1>
      <p class="intro">${esc(data.intro)}</p>
      <ul class="contact-links">${contactLinks}</ul>
    `;
  }

  function renderProject(proj) {
    const metaParts = [proj.period, proj.contribution].filter(Boolean);
    const meta = metaParts.join(' · ');

    let html = `<div class="project-block">`;
    html += tag('h4', esc(proj.name));
    if (meta) html += `<p class="project-meta">${esc(meta)}</p>`;

    if (proj.description) {
      html += `<p class="label">Description.</p>`;
      html += `<p class="desc">${esc(proj.description)}</p>`;
    }

    if (proj.whatIDid && proj.whatIDid.length > 0) {
      html += `<p class="label">What did I do.</p>`;
      html += ul(proj.whatIDid);
    }

    if (proj.result) {
      html += `<div class="result-line">${esc(proj.result)}</div>`;
    }

    if (proj.techStack && proj.techStack.length > 0) {
      html += `<p class="tech-stack"><span>Tech Stack.</span> ${proj.techStack.map(esc).join(', ')}</p>`;
    }

    html += '</div>';
    return html;
  }

  function renderExperiences(experiences) {
    let html = `<section><h2>Work Experience.</h2>`;

    experiences.forEach((exp, i) => {
      html += `<div class="company-block">`;
      html += tag('h3', esc(exp.company));
      html += `<p class="company-meta">${esc(exp.role)}&nbsp;&nbsp;${esc(exp.period)}</p>`;
      if (exp.companyDesc) html += `<p class="company-desc">${esc(exp.companyDesc)}</p>`;
      if (exp.note) html += `<p class="company-note">${esc(exp.note)}</p>`;

      exp.projects.forEach(proj => {
        html += renderProject(proj);
      });

      html += '</div>';

      if (i < experiences.length - 1) html += '<hr class="thin">';
    });

    html += '</section><hr>';
    return html;
  }

  function renderOtherExperiences(others) {
    let html = `<section><h2>Other Experiences.</h2>`;

    others.forEach(item => {
      html += `<div class="other-block">`;
      html += `<div class="other-name">${esc(item.name)}.</div>`;
      const meta = [item.role, item.period].filter(Boolean).join('  ');
      html += `<div class="other-meta">${esc(meta)}</div>`;
      if (item.description) {
        const desc = item.url
          ? item.description.replace(item.url, `<a href="${esc(item.url)}" target="_blank">${esc(item.url)}</a>`)
          : esc(item.description);
        html += `<div class="other-desc">${desc}</div>`;
      }
      html += '</div>';
    });

    html += '</section><hr>';
    return html;
  }

  function renderSkills(skills) {
    let html = `<section><h2>Skills.</h2>`;

    skills.forEach(s => {
      html += `<div class="skill-row">
        <div class="skill-cat">${esc(s.category)}.</div>
        <div class="skill-items">${s.items.map(esc).join(', ')}</div>
      </div>`;
    });

    html += '</section><hr>';
    return html;
  }

  function renderAboutMe(aboutMe) {
    let html = `<section><h2>About Me.</h2>`;

    aboutMe.forEach(block => {
      html += `<div class="about-block">`;
      html += tag('h5', esc(block.category) + '.');
      html += ul(block.items);
      html += '</div>';
    });

    html += '</section><hr>';
    return html;
  }

  function renderCertifications(certs) {
    let html = `<section><h2>Certifications.</h2>`;

    certs.forEach(c => {
      html += `<div class="cert-row">
        <div class="cert-name">${esc(c.name)}</div>
        <div class="cert-sub">${esc(c.issuer)} · ${esc(c.date)}</div>
      </div>`;
    });

    html += '</section><hr>';
    return html;
  }

  function renderContact(data) {
    const items = data.contact.map(c =>
      `<li><a href="${esc(c.url)}">${esc(c.label)}</a></li>`
    ).join('');

    return `
      <section class="contact-section">
        <h2>Contact.</h2>
        <ul>${items}</ul>
      </section>
    `;
  }

  function renderFooter(data) {
    const email = data.contact.find(c => c.label === '이메일');
    return `
      <footer>
        ${esc(data.name)} · <a href="${esc(email ? email.url : '#')}">${esc(email ? email.text : '')}</a>
      </footer>
    `;
  }

  // ── MAIN ──
  async function loadResume() {
    try {
      const res  = await fetch('./resume.json');
      const data = await res.json();

      const html = [
        renderHeader(data),
        '<hr>',
        renderExperiences(data.experiences),
        renderOtherExperiences(data.otherExperiences),
        renderSkills(data.skills),
        renderAboutMe(data.aboutMe),
        renderCertifications(data.certifications),
        renderContact(data),
        renderFooter(data),
      ].join('\n');

      document.getElementById('loading').style.display  = 'none';
      const resume = document.getElementById('resume');
      resume.innerHTML = html;
      resume.style.display = 'block';

      // Update page title
      document.title = `이력서 - ${data.name}`;
    } catch (err) {
      document.getElementById('loading').textContent =
        '⚠️ resume.json 파일을 불러오지 못했습니다. 파일이 같은 폴더에 있는지 확인해주세요.';
      console.error(err);
    }
  }

  loadResume();
</script>
</body>
</html>
