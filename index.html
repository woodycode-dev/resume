<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이력서 - 권규희</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: #fff;
      color: #333;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 400;
      font-size: 16px;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
      word-break: keep-all;
    }

    a { color: #4078c0; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── LAYOUT ── */
    .wrap {
      max-width: 800px;
      margin: 0 auto;
      padding: 64px 24px 120px;
    }

    /* ── LOADING ── */
    #loading { text-align: center; padding: 80px 0; color: #999; font-size: 14px; }

    /* ── HR ── */
    hr { border: none; border-top: 1px solid #e0e0e0; margin: 52px 0; }
    hr.sm { margin: 32px 0; border-top-color: #eee; }

    /* ─────────────────────────────
       TYPOGRAPHY SCALE
    ───────────────────────────── */
    h1 { font-size: 2rem;   font-weight: 700; line-height: 1.3; color: #111; margin-bottom: 10px; }
    h2 { font-size: 1.6rem; font-weight: 700; color: #111; margin-bottom: 28px; }
    h3 { font-size: 1.15rem; font-weight: 700; color: #111; margin-bottom: 4px; }
    h4 { font-size: 1rem;   font-weight: 700; color: #222; margin-bottom: 2px; }
    h5 { font-size: 0.9rem; font-weight: 700; color: #444; margin-bottom: 8px; }

    /* ── SUBTITLE ── */
    .subtitle { font-size: 1rem; color: #888; margin-bottom: 20px; }

    /* ── INTRO ── */
    .intro { font-size: 14.5px; line-height: 1.95; color: #444; white-space: pre-line; margin-bottom: 4px; }

    /* ── CONTACT ── */
    .contact-list { list-style: none; display: flex; flex-wrap: wrap; gap: 0; margin-top: 16px; }
    .contact-list li { font-size: 14px; }
    .contact-list li:not(:last-child)::after { content: ' · '; color: #ccc; margin: 0 4px; }

    /* ── SECTION WRAPPER ── */
    .section { margin-bottom: 0; }

    /* ── KEY STRENGTHS & ACHIEVEMENTS ── */
    .kv-list { list-style: none; padding: 0; margin-bottom: 4px; }
    .kv-list li {
      font-size: 14px;
      color: #444;
      padding-left: 18px;
      position: relative;
      margin-bottom: 6px;
      line-height: 1.75;
    }
    .kv-list li::before { content: '·'; position: absolute; left: 4px; color: #aaa; }
    .kv-list li strong { font-weight: 700; color: #222; }

    /* ── EXPERIENCE BLOCK ── */
    .exp-block { margin-bottom: 48px; }
    .exp-block:last-child { margin-bottom: 0; }

    .exp-header { margin-bottom: 16px; }
    .exp-meta { font-size: 13px; color: #888; margin-bottom: 2px; }
    .exp-note { font-size: 13px; color: #aaa; font-style: italic; margin-bottom: 14px; }

    /* ── BULLET LIST ── */
    ul.bul { list-style: none; padding: 0; margin: 0; }
    ul.bul li {
      font-size: 14px; color: #444;
      padding-left: 18px; position: relative;
      margin-bottom: 5px; line-height: 1.75;
    }
    ul.bul li::before { content: '*'; position: absolute; left: 2px; color: #bbb; font-size: 12px; top: 2px; }

    /* ── TECH STACK ── */
    .tech { font-size: 13px; color: #888; margin-top: 12px; }
    .tech b { color: #555; font-weight: 600; }

    /* ── PROJECT BLOCK (Main Projects) ── */
    .proj-block { margin-bottom: 52px; }
    .proj-block:last-child { margin-bottom: 0; }

    .proj-period { font-size: 13px; color: #aaa; margin-bottom: 2px; }
    .proj-team   { font-size: 13px; color: #aaa; margin-bottom: 20px; }

    .proj-label {
      font-size: 13px; font-weight: 700;
      color: #444; margin: 16px 0 6px;
    }
    .proj-desc { font-size: 14px; color: #555; line-height: 1.85; }

    /* ── OTHER PROJECTS ── */
    .other-company { font-size: 1rem; font-weight: 700; color: #111; margin-bottom: 16px; }

    .other-item { margin-bottom: 24px; }
    .other-item:last-child { margin-bottom: 0; }
    .other-name { font-size: 14.5px; font-weight: 700; color: #222; margin-bottom: 1px; }
    .other-meta { font-size: 13px; color: #aaa; margin-bottom: 5px; }
    .other-desc { font-size: 14px; color: #555; line-height: 1.8; }

    /* ── SKILLS ── */
    .skill-row {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 0 16px;
      margin-bottom: 10px;
      font-size: 14px;
    }
    .skill-cat { font-weight: 700; color: #333; }
    .skill-val { color: #555; }

    /* ── EDUCATION ── */
    .edu-block { margin-bottom: 28px; }
    .edu-school { font-size: 14.5px; font-weight: 700; color: #222; }
    .edu-sub    { font-size: 13.5px; color: #666; }

    .cert-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0 12px;
      margin-bottom: 8px;
      font-size: 14px;
      align-items: baseline;
    }
    .cert-name { color: #333; }
    .cert-meta { font-size: 12px; color: #aaa; text-align: right; white-space: nowrap; }
    .cert-note { font-size: 13px; color: #888; margin-top: 2px; padding-left: 1em; }

    .act-row { margin-bottom: 8px; font-size: 14px; color: #444; }
    .act-row span { color: #aaa; font-size: 13px; }

    /* ── HOW I WORK ── */
    .how-list { list-style: none; padding: 0; }
    .how-list li {
      font-size: 14px; color: #444;
      padding-left: 18px; position: relative;
      margin-bottom: 5px; line-height: 1.75;
    }
    .how-list li::before { content: '*'; position: absolute; left: 2px; color: #bbb; font-size: 12px; top: 2px; }

    /* ── CONTACT SECTION ── */
    .contact-sec ul { list-style: none; padding: 0; }
    .contact-sec ul li { font-size: 14px; margin-bottom: 6px; }
    .contact-sec ul li::before { content: '* '; color: #bbb; }

    /* ── FOOTER ── */
    footer { margin-top: 60px; padding-top: 20px; border-top: 1px solid #e0e0e0; font-size: 12px; color: #bbb; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .wrap { padding: 40px 16px 80px; }
      h1 { font-size: 1.6rem; }
      h2 { font-size: 1.3rem; }
      .skill-row { grid-template-columns: 1fr; }
      .cert-row  { grid-template-columns: 1fr; }
      .cert-meta { text-align: left; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div id="loading">데이터를 불러오는 중입니다...</div>
  <div id="resume" style="display:none;"></div>
</div>

<script>
/* ── 유틸 ── */
function e(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function bul(arr){ return '<ul class="bul">'+arr.map(i=>`<li>${e(i)}</li>`).join('')+'</ul>'; }
function kvbul(arr){ return '<ul class="kv-list">'+arr.map(i=>`<li><strong>${e(i.title)}</strong>: ${e(i.desc)}</li>`).join('')+'</ul>'; }
function techLine(arr){ return `<p class="tech"><b>Tech Stack.</b> ${arr.map(e).join(' · ')}</p>`; }

/* ── 섹션별 렌더러 ── */

function renderHeader(d){
  const links = d.contact.map(c=>`<li><a href="${e(c.url)}">${e(c.label)}</a></li>`).join('');
  return `
    <h1>${e(d.greeting)}</h1>
    <p class="subtitle">${e(d.subtitle)}</p>
    <p class="intro">${e(d.intro)}</p>
    <ul class="contact-list">${links}</ul>
  `;
}

function renderIntroduce(d){
  const strengths = kvbul(d.keyStrengths);
  const ach = '<ul class="kv-list">'+d.achievements.map(a=>`<li><strong>${e(a.title)}</strong>: ${e(a.desc)}</li>`).join('')+'</ul>';
  return `
    <section class="section">
      <h2>Introduce.</h2>
      <h3>핵심 역량.</h3>
      ${strengths}
      <br>
      <h3>주요 성과.</h3>
      ${ach}
    </section>
  `;
}

function renderExperiences(exps){
  let html = `<section class="section"><h2>Experiences.</h2>`;
  exps.forEach((exp, i)=>{
    html += `<div class="exp-block">
      <div class="exp-header">
        <h3>${e(exp.company)}</h3>
        <p class="exp-meta">${e(exp.role)}&nbsp;&nbsp;${e(exp.period)}</p>
        <p class="exp-meta">${e(exp.companyDesc)}</p>
        ${exp.note ? `<p class="exp-note">(${e(exp.note)})</p>` : ''}
      </div>
      ${bul(exp.bullets)}
      ${techLine(exp.techStack)}
    </div>`;
    if(i < exps.length-1) html += '<hr class="sm">';
  });
  html += '</section>';
  return html;
}

function renderMainProjects(projs){
  let html = `<section class="section"><h2>Main Projects.</h2>`;
  projs.forEach((p, idx)=>{
    html += `<div class="proj-block">
      <h3>${idx+1}. ${e(p.name)}</h3>
      <p class="proj-period">${e(p.period)}</p>
      <p class="proj-team">${e(p.team)}</p>

      <p class="proj-label">배경</p>
      <p class="proj-desc">${e(p.background)}</p>

      <p class="proj-label">해결</p>
      ${bul(p.whatIDid)}

      <p class="proj-label">결과</p>
      ${bul(p.result)}

      ${techLine(p.techStack)}
    </div>`;
    if(idx < projs.length-1) html += '<hr class="sm">';
  });
  html += '</section>';
  return html;
}

function renderOtherProjects(others){
  let html = `<section class="section"><h2>Other Projects.</h2>`;
  Object.entries(others).forEach(([company, items], ci)=>{
    html += `<p class="other-company">${e(company)}.</p>`;
    items.forEach((item, ii)=>{
      html += `<div class="other-item">
        <p class="other-name">${ii+1}. ${e(item.name)}</p>
        <p class="other-meta">${e(item.period)}</p>
        <p class="other-meta">${e(item.team)}</p>
        <p class="other-desc">${e(item.desc)}</p>
      </div>`;
    });
    if(ci < Object.keys(others).length-1) html += '<hr class="sm">';
  });
  html += '</section>';
  return html;
}

function renderSkills(skills){
  let html = `<section class="section"><h2>Skills.</h2>`;
  Object.entries(skills).forEach(([cat, val])=>{
    html += `<div class="skill-row"><div class="skill-cat">${e(cat)}</div><div class="skill-val">${e(val)}</div></div>`;
  });
  html += '</section>';
  return html;
}

function renderEducation(edu){
  let html = `<section class="section"><h2>Education.</h2>`;

  /* 학력 */
  html += `<h3 style="font-size:1rem;font-weight:700;color:#444;margin-bottom:12px;">학력</h3>`;
  edu.degree.forEach(d=>{
    html += `<div class="edu-block">
      <p class="edu-school">${e(d.school)}</p>
      <p class="edu-sub">${e(d.major)} · ${e(d.period)}</p>
    </div>`;
  });

  /* 자격/어학/수상 */
  html += `<hr class="sm"><h3 style="font-size:1rem;font-weight:700;color:#444;margin-bottom:12px;">자격/어학/수상</h3>`;
  edu.certifications.forEach(c=>{
    html += `<div class="cert-row">
      <div class="cert-name">${e(c.name)}</div>
      <div class="cert-meta">${e(c.issuer)} · ${e(c.date)}</div>
    </div>`;
    if(c.note) html += `<p class="cert-note">→ ${e(c.note)}</p>`;
  });

  /* 기타 활동 */
  html += `<hr class="sm"><h3 style="font-size:1rem;font-weight:700;color:#444;margin-bottom:12px;">기타 활동</h3>`;
  edu.activities.forEach(a=>{
    const nameStr = a.url ? `<a href="${e(a.url)}" target="_blank">${e(a.name)}</a>` : e(a.name);
    html += `<p class="act-row">${nameStr} · <span>${e(a.org)} · ${e(a.period)}</span></p>`;
  });

  html += '</section>';
  return html;
}

function renderHowIWork(items){
  return `
    <section class="section">
      <h2>How i work ?</h2>
      <ul class="how-list">${items.map(i=>`<li>${e(i)}</li>`).join('')}</ul>
    </section>
  `;
}

function renderContact(d){
  const items = d.contact.map(c=>`<li><a href="${e(c.url)}">${e(c.label)}</a></li>`).join('');
  return `<section class="section contact-sec"><h2>Contact.</h2><ul>${items}</ul></section>`;
}

function renderFooter(d){
  const em = d.contact.find(c=>c.label==='이메일');
  return `<footer>${e(d.name)} · <a href="${e(em?em.url:'#')}">${e(em?em.text:'')}</a></footer>`;
}

/* ── MAIN ── */
async function load(){
  try {
    const res  = await fetch('./resume.json');
    const d    = await res.json();

    const sections = [
      renderHeader(d),
      '<hr>',
      renderIntroduce(d),
      '<hr>',
      renderExperiences(d.experiences),
      '<hr>',
      renderMainProjects(d.mainProjects),
      '<hr>',
      renderOtherProjects(d.otherProjects),
      '<hr>',
      renderSkills(d.skills),
      '<hr>',
      renderEducation(d.education),
      '<hr>',
      renderHowIWork(d.howIWork),
      '<hr>',
      renderContact(d),
      renderFooter(d),
    ];

    document.getElementById('loading').style.display = 'none';
    const root = document.getElementById('resume');
    root.innerHTML = sections.join('\n');
    root.style.display = 'block';
    document.title = d.pageTitle || `이력서 - ${d.name}`;
  } catch(err) {
    document.getElementById('loading').textContent =
      '⚠️ resume.json을 불러오지 못했습니다. 같은 폴더에 파일이 있는지 확인해주세요. (로컬 실행 시 Live Server 사용 필요)';
    console.error(err);
  }
}

load();
</script>
</body>
</html>
