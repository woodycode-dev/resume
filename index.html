<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>권규희 | Backend Engineer Portfolio</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/client-side-templates.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mustache.js/4.1.0/mustache.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-slate-900" hx-ext="client-side-templates">

    <nav class="sticky top-0 bg-white/80 backdrop-blur-md border-b z-50">
        <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
            <span class="font-black text-xl tracking-tight text-blue-600">KWON GYUHEE</span>
            <div class="flex gap-6 text-sm font-bold" hx-target="#content">
                <button hx-get="data.json" mustache-template="intro-tpl" class="hover:text-blue-600">Intro</button>
                <button hx-get="data.json" mustache-template="project-tpl" class="hover:text-blue-600">Projects</button>
                <button hx-get="data.json" mustache-template="skill-tpl" class="hover:text-blue-600">Skills</button>
            </div>
        </div>
    </nav>

    <main id="content" class="max-w-4xl mx-auto py-12 px-6">
        <div hx-get="data.json" hx-trigger="load" mustache-template="intro-tpl"></div>
    </main>

    <!-- TPL: Intro -->
    <template id="intro-tpl">
        <section class="space-y-10 animate-in fade-in slide-in-from-bottom-4 duration-700">
            <header>
                <h1 class="text-5xl font-black leading-tight mb-6">{{intro.name}}</h1>
                <p class="text-xl text-slate-600 font-medium">{{intro.role}}</p>
            </header>
            <div class="bg-blue-600 text-white p-8 rounded-2xl shadow-xl">
                <p class="text-lg leading-relaxed opacity-90">{{intro.summary}}</p>
            </div>
            <div class="grid md:grid-cols-2 gap-6">
                {{#intro.strengths}}
                <div class="flex items-start gap-3 p-4 bg-white rounded-lg border shadow-sm">
                    <span class="text-blue-500 font-bold">✓</span>
                    <p class="text-sm font-semibold">{{.}}</p>
                </div>
                {{/intro.strengths}}
            </div>
            <hr>
            <h2 class="text-2xl font-bold">Experience</h2>
            <div class="space-y-8">
                {{#experiences}}
                <div class="border-l-2 border-slate-200 pl-6 relative">
                    <div class="absolute -left-1.5 top-1.5 w-3 h-3 bg-blue-500 rounded-full"></div>
                    <h3 class="font-bold text-lg">{{company}}</h3>
                    <p class="text-sm text-slate-500 mb-2">{{role}} | {{period}}</p>
                    <p class="text-slate-600">{{desc}}</p>
                </div>
                {{/experiences}}
            </div>
        </section>
    </template>

    <!-- TPL: Projects -->
    <template id="project-tpl">
        <section class="space-y-8 animate-in fade-in duration-500">
            <h2 class="text-3xl font-black mb-8">Main Projects</h2>
            {{#mainProjects}}
            <div class="bg-white border rounded-2xl p-8 hover:shadow-lg transition">
                <div class="flex justify-between items-start mb-4">
                    <h3 class="text-2xl font-bold text-slate-800">{{title}}</h3>
                    <span class="text-sm font-mono text-slate-400">{{period}}</span>
                </div>
                <div class="flex flex-wrap gap-2 mb-6">
                    {{#tags}}
                    <span class="bg-slate-100 px-2 py-1 rounded text-xs font-bold text-slate-600">#{{.}}</span>
                    {{/tags}}
                </div>
                <p class="text-blue-600 text-sm font-bold mb-4 italic">내 기여도: {{contribution}}</p>
                <ul class="space-y-3">
                    {{#details}}
                    <li class="flex gap-2 text-slate-600">
                        <span class="text-slate-300">•</span> {{.}}
                    </li>
                    {{/details}}
                </ul>
            </div>
            {{/mainProjects}}
        </section>
    </template>

    <!-- TPL: Skills -->
    <template id="skill-tpl">
        <section class="grid md:grid-cols-2 gap-8 animate-in fade-in duration-500">
            <div class="space-y-4">
                <h3 class="text-xl font-bold border-b pb-2">Languages & Frameworks</h3>
                <div class="flex flex-wrap gap-2">
                    {{#skills.languages}}<span class="bg-white border px-4 py-2 rounded-full shadow-sm">{{.}}</span>{{/skills.languages}}
                    {{#skills.frameworks}}<span class="bg-blue-50 border border-blue-100 px-4 py-2 rounded-full shadow-sm text-blue-700 font-bold">{{.}}</span>{{/skills.frameworks}}
                </div>
            </div>
            <div class="space-y-4">
                <h3 class="text-xl font-bold border-b pb-2">Databases & Infrastructure</h3>
                <div class="flex flex-wrap gap-2">
                    {{#skills.databases}}<span class="bg-white border px-4 py-2 rounded-full shadow-sm">{{.}}</span>{{/skills.databases}}
                    {{#skills.tools}}<span class="bg-slate-50 border px-4 py-2 rounded-full shadow-sm">{{.}}</span>{{/skills.tools}}
                </div>
            </div>
        </section>
    </template>

</body>
</html>
